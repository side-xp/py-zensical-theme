name: Release

on:
  push:
    branches:
      - main

jobs:

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The steps below run only on the push that merges a release PR, i.e. when a
      # new release was just cut. They build the distribution and attach it to the
      # GitHub Release so consumer sites can pin a tag or download the wheel directly.
      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-python@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          python-version: 3.x

      - name: Build sdist and wheel
        if: ${{ steps.release.outputs.release_created }}
        run: |
          pip install build
          python -m build

      - name: Attach build artifacts to the release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} dist/*

  # Deploys the showcase to GitHub Pages and attaches a snapshot of the built site
  # to the release. Runs only when the release job just cut a new release, so the
  # live demo always matches the published version.
  docs:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install .
      - run: zensical build --clean

      - name: Bundle the built site for the release
        run: zip -r site.zip site

      - name: Attach the site to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release.outputs.tag_name }} site.zip

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - uses: actions/deploy-pages@v5
        id: deployment
