# Default configuration for the "side-xp" theme.
#
# Zensical merges these values into a consumer's project, so anything set here
# becomes the default for every site that uses `theme.name = "side-xp"`.
# Consumers can still override any of it in their own zensical.toml.

# Build on top of Zensical's default theme (the Material look). This gives us
# the full base theme and lets us override only what we need to brand it.
extends: material

# Ship a light + dark palette by default. Both schemes opt into "custom"
# colors so the brand stylesheet (sidexp.css) drives primary/accent, and each
# carries a "toggle" so consumers get the light/dark switch button out of the
# box. A consumer that defines its own "palette" replaces this entirely.
palette:
  - scheme: default
    primary: custom
    accent: custom
    toggle:
      icon: lucide/sun
      name: Switch to dark mode
  - scheme: slate
    primary: custom
    accent: custom
    toggle:
      icon: lucide/moon
      name: Switch to light mode
